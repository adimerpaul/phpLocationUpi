<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MapaApp – Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #0d5c8c;
      --blue-d: #07304f;
      --accent: #1a85c2;
      --h: 56px;
      --sheet-h: 320px;
    }

    html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--h);
      background: linear-gradient(90deg, var(--blue-d), var(--blue));
      display: flex; align-items: center; padding: 0 1rem; gap: .8rem;
      z-index: 900; box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    #header .back {
      background: none; border: none; cursor: pointer; color: #fff; display: flex;
      padding: 4px;
    }
    #header .back svg { width: 22px; height: 22px; fill: #fff; }
    #header .title { flex: 1; color: #fff; font-size: 1.05rem; font-weight: 700; letter-spacing: -.3px; }
    #header .user-pill {
      display: flex; align-items: center; gap: .4rem;
      background: rgba(255,255,255,.15); border-radius: 50px;
      padding: .3rem .7rem; color: #fff; font-size: .8rem;
    }
    #header .user-pill svg { width: 16px; height: 16px; fill: #fff; }
    #header .btn-logout {
      background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3);
      border-radius: 50px; padding: .3rem .7rem; color: #fff; font-size: .78rem;
      cursor: pointer; transition: background .2s;
    }
    #header .btn-logout:hover { background: rgba(255,255,255,.28); }

    /* ── Map ── */
    #map {
      position: fixed; top: var(--h); left: 0; right: 0; bottom: 0;
      z-index: 1;
    }

    /* ── FAB ── */
    #fab {
      position: fixed; right: 1rem; bottom: 5.5rem; z-index: 800;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--blue); border: none; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s;
    }
    #fab:hover { background: var(--accent); }
    #fab.active { background: #c0392b; transform: rotate(45deg); }
    #fab svg { width: 26px; height: 26px; fill: #fff; }

    /* ── View list btn ── */
    #btn-list {
      position: fixed; right: 1rem; bottom: 1.8rem; z-index: 800;
      background: #fff; border: none; border-radius: 50px; cursor: pointer;
      display: flex; align-items: center; gap: .5rem;
      padding: .55rem 1.1rem; font-size: .88rem; font-weight: 600;
      color: var(--blue); box-shadow: 0 3px 14px rgba(0,0,0,.22);
      transition: box-shadow .2s;
    }
    #btn-list:hover { box-shadow: 0 5px 18px rgba(0,0,0,.3); }
    #btn-list svg { width: 18px; height: 18px; fill: var(--blue); }

    /* ── Locate btn ── */
    #btn-locate {
      position: fixed; right: 1rem; bottom: 9.5rem; z-index: 800;
      width: 42px; height: 42px; border-radius: 50%;
      background: #fff; border: none; cursor: pointer;
      box-shadow: 0 3px 12px rgba(0,0,0,.22);
      display: flex; align-items: center; justify-content: center;
    }
    #btn-locate svg { width: 20px; height: 20px; fill: var(--blue); }

    /* ── Toast hint ── */
    #toast {
      position: fixed; top: calc(var(--h) + 10px); left: 50%; transform: translateX(-50%);
      background: rgba(7,48,79,.9); color: #fff; padding: .55rem 1.2rem;
      border-radius: 50px; font-size: .85rem; z-index: 850; display: none;
      white-space: nowrap; box-shadow: 0 2px 10px rgba(0,0,0,.3);
    }
    #toast.show { display: block; animation: fadeDown .25s; }
    @keyframes fadeDown { from { opacity:0; transform:translateX(-50%) translateY(-6px); } to { opacity:1; transform:translateX(-50%); } }

    /* ── Bottom Sheet ── */
    #sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: #fff; border-radius: 18px 18px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,.18);
      z-index: 850; transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      max-height: 80vh; overflow-y: auto;
    }
    #sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 40px; height: 4px; background: #ddd;
      border-radius: 2px; margin: .8rem auto .4rem;
    }
    .sheet-body { padding: 0 1.2rem 2rem; }
    .sheet-title {
      font-size: 1rem; font-weight: 700; color: var(--blue-d);
      margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;
    }
    .sheet-close {
      background: none; border: none; cursor: pointer; color: #999; font-size: 1.4rem; line-height: 1;
    }

    /* Form inside sheet */
    .fg { margin-bottom: .9rem; }
    .fg label { display: block; font-size: .8rem; font-weight: 600; color: #555; margin-bottom: .3rem; }
    .fg input, .fg textarea {
      width: 100%; padding: .75rem .9rem;
      border: 1.5px solid #dde; border-radius: 10px;
      font-size: .95rem; color: #222; outline: none;
      transition: border .2s;
    }
    .fg input:focus, .fg textarea:focus { border-color: var(--accent); }
    .fg textarea { resize: none; height: 70px; }
    .fg .coords { font-size: .78rem; color: #888; margin-top: .25rem; }

    .row { display: flex; gap: .7rem; }
    .btn-cancel {
      flex: 1; padding: .8rem; border: 1.5px solid #dde; border-radius: 50px;
      background: #fff; color: #555; font-size: .92rem; font-weight: 600; cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: .8rem; border: none; border-radius: 50px;
      background: var(--blue); color: #fff; font-size: .92rem; font-weight: 700; cursor: pointer;
      transition: opacity .2s;
    }
    .btn-save:disabled { opacity: .55; cursor: not-allowed; }

    /* ── Sidebar / List panel ── */
    #sidebar {
      position: fixed; top: var(--h); right: 0; width: min(340px, 90vw);
      bottom: 0; background: #fff; z-index: 870;
      transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,.15);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-header {
      padding: 1rem 1.2rem .7rem;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #eee;
    }
    #sidebar-header h2 { font-size: 1rem; font-weight: 700; color: var(--blue-d); }
    #sidebar-header button {
      background: none; border: none; cursor: pointer; color: #999; font-size: 1.4rem;
    }
    #loc-list { flex: 1; overflow-y: auto; }
    .loc-item {
      display: flex; align-items: flex-start; gap: .8rem;
      padding: .85rem 1.2rem; border-bottom: 1px solid #f0f0f0;
      cursor: pointer; transition: background .15s;
    }
    .loc-item:hover { background: #f7faff; }
    .loc-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .loc-icon svg { width: 18px; height: 18px; fill: #fff; }
    .loc-info { flex: 1; min-width: 0; }
    .loc-info .name { font-size: .9rem; font-weight: 600; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .loc-info .desc { font-size: .78rem; color: #888; margin-top: .15rem; }
    .loc-info .coords-sm { font-size: .72rem; color: #aaa; margin-top: .1rem; }
    .loc-del {
      background: none; border: none; cursor: pointer;
      color: #ccc; padding: 4px; flex-shrink: 0;
    }
    .loc-del:hover { color: #e53935; }
    .loc-del svg { width: 18px; height: 18px; fill: currentColor; }
    .empty-list {
      text-align: center; color: #bbb; padding: 3rem 1rem; font-size: .9rem;
    }

    /* ── Leaflet popup override ── */
    .leaflet-popup-content-wrapper {
      border-radius: 12px; box-shadow: 0 4px 18px rgba(0,0,0,.2);
    }
    .popup-inner { font-size: .88rem; min-width: 160px; }
    .popup-inner .pname { font-weight: 700; color: var(--blue-d); font-size: .95rem; margin-bottom: .3rem; }
    .popup-inner .pdesc { color: #666; margin-bottom: .4rem; }
    .popup-inner .pcoords { color: #aaa; font-size: .75rem; margin-bottom: .6rem; }
    .popup-inner .pdel {
      display: inline-block; color: #e53935; font-size: .8rem; cursor: pointer;
      font-weight: 600; text-decoration: underline;
    }

    /* spinner */
    .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: rot .6s linear infinite; vertical-align: middle; }
    @keyframes rot { to { transform: rotate(360deg); } }

    @media (min-width: 768px) {
      #btn-list { right: calc(min(340px, 90vw) + 1rem); }
      #fab       { right: calc(min(340px, 90vw) + 1rem); }
      #btn-locate{ right: calc(min(340px, 90vw) + 1rem); }
    }
  </style>
</head>
<body>

<!-- Header -->
<header id="header">
  <button class="back" onclick="goBack()" aria-label="Volver">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  </button>
  <div class="title">MapaApp</div>
  <div class="user-pill">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    <span id="username-label">...</span>
  </div>
  <button class="btn-logout" onclick="logout()">Salir</button>
</header>

<!-- Map -->
<div id="map"></div>

<!-- Toast hint -->
<div id="toast">Toca el mapa para colocar la ubicación</div>

<!-- Locate me -->
<button id="btn-locate" onclick="locateMe()" aria-label="Mi ubicación">
  <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
</button>

<!-- FAB -->
<button id="fab" onclick="toggleAddMode()" aria-label="Agregar ubicación">
  <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
</button>

<!-- View list button -->
<button id="btn-list" onclick="toggleSidebar()">
  <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
  Ver lista
</button>

<!-- ── Bottom Sheet (add location) ── -->
<div id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-body">
    <div class="sheet-title">
      <span>Nueva Ubicación</span>
      <button class="sheet-close" onclick="closeSheet()">×</button>
    </div>
    <div class="fg">
      <label>Nombre <span style="color:#e53935">*</span></label>
      <input id="s-nombre" type="text" placeholder="Nombre del lugar">
    </div>
    <div class="fg">
      <label>Descripción</label>
      <textarea id="s-desc" placeholder="Descripción opcional..."></textarea>
    </div>
    <div class="fg">
      <label>Coordenadas</label>
      <p class="coords" id="s-coords">—</p>
    </div>
    <div class="row">
      <button class="btn-cancel" onclick="closeSheet()">Cancelar</button>
      <button class="btn-save"   id="btn-save" onclick="saveUbicacion()">Guardar</button>
    </div>
  </div>
</div>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <div id="sidebar-header">
    <h2>Mis Ubicaciones</h2>
    <button onclick="toggleSidebar()" aria-label="Cerrar lista">×</button>
  </div>
  <div id="loc-list">
    <div class="empty-list">Cargando...</div>
  </div>
</div>

<script>
  const API = '/mapa/api';
  const tok  = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('usuario') || 'null');

  if (!tok) location.href = 'login.html';
  document.getElementById('username-label').textContent = user?.nombre?.split(' ')[0] || user?.usuario || 'Usuario';

  /* ── Auth header ── */
  const H = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tok });

  /* ── Leaflet map ── */
  const map = L.map('map', { zoomControl: false }).setView([-12.0464, -77.0428], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  L.control.zoom({ position: 'topleft' }).addTo(map);

  /* Custom icon */
  const pinIcon = L.divIcon({
    className: '',
    html: `<svg width="32" height="42" viewBox="0 0 32 42" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 0C9.4 0 4 5.4 4 12c0 9 12 30 12 30S28 21 28 12C28 5.4 22.6 0 16 0z" fill="#0d5c8c"/>
      <circle cx="16" cy="12" r="6" fill="white"/>
    </svg>`,
    iconSize: [32, 42], iconAnchor: [16, 42], popupAnchor: [0, -44]
  });

  const tempIcon = L.divIcon({
    className: '',
    html: `<svg width="32" height="42" viewBox="0 0 32 42" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 0C9.4 0 4 5.4 4 12c0 9 12 30 12 30S28 21 28 12C28 5.4 22.6 0 16 0z" fill="#e53935"/>
      <circle cx="16" cy="12" r="6" fill="white"/>
    </svg>`,
    iconSize: [32, 42], iconAnchor: [16, 42]
  });

  /* ── State ── */
  let addMode     = false;
  let tempMarker  = null;
  let pendingLat  = null;
  let pendingLng  = null;
  let markers     = {};

  /* ── Load all locations ── */
  async function loadUbicaciones() {
    try {
      const res  = await fetch(API + '/ubicaciones', { headers: H() });
      if (res.status === 401) { handleUnauth(); return; }
      const data = await res.json();
      renderMarkers(data);
      renderList(data);
    } catch { console.error('Error cargando ubicaciones'); }
  }

  function renderMarkers(list) {
    // Remove old markers
    Object.values(markers).forEach(m => map.removeLayer(m));
    markers = {};

    list.forEach(u => {
      const m = L.marker([u.lat, u.lng], { icon: pinIcon }).addTo(map);
      m.bindPopup(popupHtml(u));
      markers[u.id] = m;
    });
  }

  function popupHtml(u) {
    return `<div class="popup-inner">
      <div class="pname">${esc(u.nombre)}</div>
      ${u.descripcion ? `<div class="pdesc">${esc(u.descripcion)}</div>` : ''}
      <div class="pcoords">${parseFloat(u.lat).toFixed(5)}, ${parseFloat(u.lng).toFixed(5)}</div>
      <span class="pdel" onclick="deleteUbicacion(${u.id})">🗑 Eliminar</span>
    </div>`;
  }

  function renderList(list) {
    const el = document.getElementById('loc-list');
    if (!list.length) {
      el.innerHTML = '<div class="empty-list">No hay ubicaciones registradas.<br>Toca <b>+</b> para agregar una.</div>';
      return;
    }
    el.innerHTML = list.map(u => `
      <div class="loc-item" onclick="flyTo(${u.id}, ${u.lat}, ${u.lng})">
        <div class="loc-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg></div>
        <div class="loc-info">
          <div class="name">${esc(u.nombre)}</div>
          ${u.descripcion ? `<div class="desc">${esc(u.descripcion)}</div>` : ''}
          <div class="coords-sm">${parseFloat(u.lat).toFixed(5)}, ${parseFloat(u.lng).toFixed(5)}</div>
        </div>
        <button class="loc-del" onclick="event.stopPropagation(); deleteUbicacion(${u.id})" aria-label="Eliminar">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
      </div>`).join('');
  }

  function flyTo(id, lat, lng) {
    map.flyTo([lat, lng], 16, { duration: 1 });
    if (markers[id]) markers[id].openPopup();
    if (window.innerWidth < 768) toggleSidebar();
  }

  /* ── Add mode ── */
  function toggleAddMode() {
    addMode = !addMode;
    document.getElementById('fab').classList.toggle('active', addMode);
    document.getElementById('toast').classList.toggle('show', addMode);
    if (!addMode) {
      removeTempMarker();
      closeSheet();
    }
  }

  map.on('click', e => {
    if (!addMode) return;
    removeTempMarker();
    pendingLat = e.latlng.lat;
    pendingLng = e.latlng.lng;
    tempMarker = L.marker([pendingLat, pendingLng], { icon: tempIcon }).addTo(map);
    document.getElementById('s-coords').textContent =
      pendingLat.toFixed(6) + ', ' + pendingLng.toFixed(6);
    document.getElementById('s-nombre').value = '';
    document.getElementById('s-desc').value   = '';
    openSheet();
    document.getElementById('toast').classList.remove('show');
  });

  function removeTempMarker() {
    if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
  }

  function openSheet()  { document.getElementById('sheet').classList.add('open'); }
  function closeSheet() {
    document.getElementById('sheet').classList.remove('open');
    removeTempMarker();
    if (addMode) toggleAddMode();
  }

  /* ── Save new location ── */
  async function saveUbicacion() {
    const nombre = document.getElementById('s-nombre').value.trim();
    if (!nombre) { document.getElementById('s-nombre').focus(); return; }
    if (pendingLat === null) return;

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Guardando';

    try {
      const res = await fetch(API + '/ubicaciones', {
        method: 'POST', headers: H(),
        body: JSON.stringify({
          nombre,
          descripcion: document.getElementById('s-desc').value.trim() || null,
          lat: pendingLat,
          lng: pendingLng
        })
      });
      if (res.status === 401) { handleUnauth(); return; }
      if (res.ok) {
        closeSheet();
        loadUbicaciones();
      } else {
        const d = await res.json();
        alert(d.error || Object.values(d.errors || {}).join(', '));
      }
    } catch { alert('Error de conexión'); }
    finally  { btn.disabled = false; btn.textContent = 'Guardar'; }
  }

  /* ── Delete location ── */
  async function deleteUbicacion(id) {
    if (!confirm('¿Eliminar esta ubicación?')) return;
    try {
      const res = await fetch(API + '/ubicaciones/' + id, { method: 'DELETE', headers: H() });
      if (res.ok) loadUbicaciones();
    } catch { alert('Error al eliminar'); }
  }

  /* ── Sidebar ── */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  /* ── Locate me ── */
  function locateMe() {
    if (!navigator.geolocation) { alert('Geolocalización no disponible'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      map.flyTo([pos.coords.latitude, pos.coords.longitude], 15);
    }, () => alert('No se pudo obtener tu ubicación'));
  }

  /* ── Logout ── */
  async function logout() {
    try {
      await fetch(API + '/usuarios/logout', { method: 'POST', headers: H() });
    } catch {}
    localStorage.removeItem('token');
    localStorage.removeItem('usuario');
    location.href = 'login.html';
  }

  function goBack() { logout(); }

  function handleUnauth() {
    localStorage.removeItem('token');
    localStorage.removeItem('usuario');
    location.href = 'login.html';
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Init ── */
  loadUbicaciones();

  // Try to center on user location on load
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 14);
    });
  }
</script>
</body>
</html>
